version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: leadflow-db
    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: leadflowdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build: ./server
    container_name: leadflow-server

    depends_on:
      - postgres

    ports:
      - "5000:5000"

    environment:
      DB_USER: postgres
      DB_HOST: postgres
      DB_NAME: leadflowdb
      DB_PASSWORD: postgres123
      DB_PORT: 5432
      PORT: 5000

    command: sh -c "node initDb.js && node seed.js && npm start"

  client:
    build: ./client
    container_name: leadflow-client

    depends_on:
      - server

    ports:
      - "5173:5173"

    stdin_open: true
    tty: true

volumes:
  postgres_data:
